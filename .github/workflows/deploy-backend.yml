name: Deploy Backend to EC2

on:
push:
branches:
- master
workflow_dispatch:

concurrency:
group: deploy-backend-production
cancel-in-progress: true

jobs:
deploy-ec2-1:
name: Deploy EC2-1
runs-on: ubuntu-latest

```
steps:
  - name: Setup SSH
    run: |
      mkdir -p ~/.ssh
      echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/ute_doctor_deploy
      chmod 600 ~/.ssh/ute_doctor_deploy

      echo "Private key fingerprint:"
      ssh-keygen -lf ~/.ssh/ute_doctor_deploy

      ssh-keyscan -H "${{ secrets.EC2_1_HOST }}" >> ~/.ssh/known_hosts

  - name: Deploy EC2-1
    run: |
      ssh -o IdentitiesOnly=yes -i ~/.ssh/ute_doctor_deploy "${{ secrets.EC2_USER }}@${{ secrets.EC2_1_HOST }}" << 'EOF'
        set -e

        echo "=============================="
        echo "Deploy target: EC2-1"
        echo "=============================="
        hostname
        hostname -I

        cd ~/ute-doctor-be

        echo "Pulling latest source..."
        git fetch origin master
        git reset --hard origin/master

        echo "Checking env files..."
        test -f .env
        test -f .env.production

        echo "Compose env:"
        cat .env

        echo "Validating EC2-1 compose..."
        docker compose --env-file .env -f docker-compose.ec2-1.yml config --quiet

        echo "Containers before cleanup:"
        docker ps -a --format "table {{.ID}}\t{{.Names}}\t{{.Status}}\t{{.Ports}}"

        echo "Stopping/removing known old API containers..."
        docker rm -f ute-doctor-be-api-1 ute-doctor-api-1 ute-doctor-api-2 2>/dev/null || true

        echo "Removing any container currently publishing port 3001..."
        docker ps -a --filter "publish=3001" --format "table {{.ID}}\t{{.Names}}\t{{.Status}}\t{{.Ports}}"
        docker ps -aq --filter "publish=3001" | xargs -r docker rm -f

        echo "Checking host port 3001 after cleanup..."
        sudo ss -ltnp | grep ':3001' || true

        echo "Building and restarting EC2-1 services..."
        docker compose --env-file .env -f docker-compose.ec2-1.yml up -d --build --remove-orphans

        echo "Current EC2-1 containers:"
        docker compose --env-file .env -f docker-compose.ec2-1.yml ps
        docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

        echo "Waiting for API1..."
        sleep 10

        echo "Smoke test API1:"
        curl -fsS http://127.0.0.1:3001/api

        echo "EC2-1 deploy completed."
      EOF
```

deploy-ec2-2:
name: Deploy EC2-2
runs-on: ubuntu-latest
needs: deploy-ec2-1

```
steps:
  - name: Setup SSH
    run: |
      mkdir -p ~/.ssh
      echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/ute_doctor_deploy
      chmod 600 ~/.ssh/ute_doctor_deploy

      echo "Private key fingerprint:"
      ssh-keygen -lf ~/.ssh/ute_doctor_deploy

      ssh-keyscan -H "${{ secrets.EC2_2_HOST }}" >> ~/.ssh/known_hosts

  - name: Deploy EC2-2
    run: |
      ssh -o IdentitiesOnly=yes -i ~/.ssh/ute_doctor_deploy "${{ secrets.EC2_USER }}@${{ secrets.EC2_2_HOST }}" << 'EOF'
        set -e

        echo "=============================="
        echo "Deploy target: EC2-2"
        echo "=============================="
        hostname
        hostname -I

        cd ~/ute-doctor-be

        echo "Pulling latest source..."
        git fetch origin master
        git reset --hard origin/master

        echo "Checking env files..."
        test -f .env
        test -f .env.production

        echo "Compose env:"
        cat .env

        echo "Validating EC2-2 compose..."
        docker compose --env-file .env -f docker-compose.ec2-2.yml config --quiet

        echo "Containers before cleanup:"
        docker ps -a --format "table {{.ID}}\t{{.Names}}\t{{.Status}}\t{{.Ports}}"

        echo "Stopping/removing known old API containers..."
        docker rm -f ute-doctor-be-api-1 ute-doctor-api-1 ute-doctor-api-2 2>/dev/null || true

        echo "Removing any container currently publishing port 3001..."
        docker ps -a --filter "publish=3001" --format "table {{.ID}}\t{{.Names}}\t{{.Status}}\t{{.Ports}}"
        docker ps -aq --filter "publish=3001" | xargs -r docker rm -f

        echo "Cleaning accidental infra containers on EC2-2..."
        docker rm -f ute-doctor-mongodb ute-doctor-redis ute-doctor-rabbitmq 2>/dev/null || true

        echo "Checking host port 3001 after cleanup..."
        sudo ss -ltnp | grep ':3001' || true

        echo "Building and restarting API2 only..."
        docker compose --env-file .env -f docker-compose.ec2-2.yml up -d --build --remove-orphans

        echo "Current EC2-2 containers:"
        docker compose --env-file .env -f docker-compose.ec2-2.yml ps
        docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

        echo "Waiting for API2..."
        sleep 10

        echo "Smoke test API2:"
        curl -fsS http://127.0.0.1:3001/api

        echo "EC2-2 deploy completed."
      EOF
```
